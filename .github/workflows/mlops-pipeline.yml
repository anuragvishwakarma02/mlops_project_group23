name: MLOps Pipeline

on:
  push:
    branches: [main,develop]
  workflow_dispatch:
    inputs:
      push_to_hub:
        description: 'Push model to Hugging Face Hub'
        type: boolean
        default: true
      hf_repo:
        description: 'Hugging Face repo id (e.g. your-username/distilbert-reviews-genres)'
        type: string
        default: 'anuragvishwakarma02/test'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Debug - list repo root
        run: ls -la
        
      - name: Build Docker image
        run: docker build -t mlops .
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        run: |
          REPO_NAME="${{ vars.DOCKERHUB_REPO }}"
          if [ -z "$REPO_NAME" ]; then
            REPO_NAME="mlops"
          fi

          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/$REPO_NAME"
          SHA_TAG="${GITHUB_SHA::7}"

          docker tag mlops "$IMAGE:latest"
          docker tag mlops "$IMAGE:$SHA_TAG"

          docker push "$IMAGE:latest"
          docker push "$IMAGE:$SHA_TAG"

      - name: Run full pipeline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.push_to_hub }}" = "true" ] && [ -n "${{ inputs.hf_repo }}" ]; then
            ARGS="--push-to-hub --repo ${{ inputs.hf_repo }}"
          fi
          docker run --rm -e HF_TOKEN="${HF_TOKEN}" -e WANDB_API_KEY="${WANDB_API_KEY}" mlops $ARGS

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval_results/
          retention-days: 30
